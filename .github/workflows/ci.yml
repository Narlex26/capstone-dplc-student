name: CI

# Intégration continue (tous les jobs sont bloquants) :
#   - build de l'image Docker (valide le Dockerfile optimisé)
#   - validation des manifests Kubernetes (kubeconform sur k8s/)
#   - tests applicatifs property-based (déterministes après correction des générateurs)
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ----------------------------------------------------------------
  # BLOQUANT — valide l'artefact applicatif (le Dockerfile optimisé)
  # ----------------------------------------------------------------
  docker-build:
    name: Build image Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Construit l'image pour vérifier que le Dockerfile est valide.
      # Le push vers GHCR se fait dans deploy.yml (uniquement sur main).
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          tags: worldcup:ci-${{ github.sha }}

  # ----------------------------------------------------------------
  # BLOQUANT — valide le livrable d'infra (les manifests Kubernetes)
  # ----------------------------------------------------------------
  k8s-validate:
    name: Validation des manifests Kubernetes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kubeconform (validation des schémas k8s)
        run: |
          VERSION=v0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${VERSION}/kubeconform-linux-amd64.tar.gz" | tar -xz kubeconform
          ./kubeconform -strict -summary -ignore-missing-schemas k8s/

  # ----------------------------------------------------------------
  # BLOQUANT — tests applicatifs property-based (jest + PostgreSQL)
  # ----------------------------------------------------------------
  app-tests:
    name: Tests applicatifs
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: worldcup2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: worldcup2026
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Load database schema
        run: psql "postgresql://postgres:postgres@localhost:5432/worldcup2026" -f app/init.sql

      - name: Run tests
        working-directory: app
        run: npm test
