name: CI

# Intégration continue : tests + validation du build Docker.
# Tourne sur chaque push et chaque PR. Ne déploie rien.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (jest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: worldcup2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: worldcup2026
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Load database schema
        run: psql "postgresql://postgres:postgres@localhost:5432/worldcup2026" -f app/init.sql

      - name: Run tests
        working-directory: app
        run: npm test

  docker-build:
    name: Validate Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Construit l'image pour vérifier que le Dockerfile est valide.
      # Le push vers GHCR se fait dans deploy.yml (uniquement sur main).
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          tags: worldcup:ci-${{ github.sha }}
