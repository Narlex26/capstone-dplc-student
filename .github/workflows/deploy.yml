name: Deploy

# Déploiement continu : build -> push image sur GHCR -> envoi des manifests
# sur le VPS (scp) -> kubectl apply via SSH (k3s).
# kubectl apply = CREATE (1er run) + UPDATE (runs suivants).
on:
  push:
    branches: [main]
  workflow_dispatch:        # permet aussi un déploiement manuel depuis l'onglet Actions

concurrency:
  group: deploy-production    # un seul déploiement à la fois
  cancel-in-progress: false

env:
  # Registre GHCR cible. Le push nécessite un token avec scope write:packages (GHCR_TOKEN).
  IMAGE: ghcr.io/alixsanta/worldcup-app

jobs:
  build-and-push:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Login sur GHCR avec un Personal Access Token (scope write:packages).
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    name: Deploy manifests to VPS (kubectl)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Envoie les manifests Kubernetes sur le VPS (pas de git côté serveur).
      - name: Copy k8s manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "k8s"
          target: "worldcup-deploy"      # -> ~/worldcup-deploy/k8s sur le VPS
          rm: true                        # nettoie la cible avant copie

      # 2. Déploie : applique les manifests, injecte l'image construite par le CI,
      #    attend le rollout. Le Secret postgres-secret est géré NATIVEMENT dans le
      #    cluster (créé une fois à la main) — la pipeline n'y touche pas.
      - name: kubectl apply via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ env.IMAGE }}
          TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,TAG
          script: |
            set -euo pipefail
            # Le user deployer (non-root) utilise sa copie du kubeconfig k3s.
            export KUBECONFIG="$HOME/.kube/config"
            K8S_DIR="$HOME/worldcup-deploy/k8s"

            # Namespace d'abord (les autres ressources en dépendent)
            kubectl apply -f "$K8S_DIR/namespace.yaml"

            # Tous les manifests (deployments, services, hpa, ingress, pvc, configmap)
            kubectl apply -f "$K8S_DIR"

            # Injecte l'image construite par le CI (override l'image du manifest)
            kubectl set image deployment/express express="$IMAGE:$TAG" -n worldcup

            # Attend que le déploiement soit effectif
            kubectl rollout status deployment/express -n worldcup --timeout=120s
