name: Deploy

# Déploiement continu : build -> push image GHCR -> envoi du chart sur le VPS (scp)
# -> helm upgrade via SSH (k3s).
# helm upgrade --install = CREATE (1er run) + UPDATE (runs suivants).
on:
  push:
    branches: [main]
  workflow_dispatch:        # permet aussi un déploiement manuel depuis l'onglet Actions

concurrency:
  group: deploy-production    # un seul déploiement à la fois
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # autorise le push vers GHCR avec le GITHUB_TOKEN
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (lowercase)
        id: meta
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

  deploy:
    name: Deploy chart to VPS (Helm)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Envoie le chart Helm (la "notice" de déploiement) sur le VPS.
      #    Pas de git sur le VPS : le runner a déjà le repo, il copie le chart en scp.
      - name: Copy Helm chart to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "helm/worldcup"
          target: "worldcup-deploy"      # -> ~/worldcup-deploy/helm/worldcup sur le VPS
          rm: true                        # nettoie la cible avant copie (pas de fichiers obsolètes)

      # 2. Déploie : helm lit le chart copié, k3s tire l'image depuis GHCR.
      - name: helm upgrade --install via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          TAG: ${{ needs.build-and-push.outputs.tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,TAG
          script: |
            set -euo pipefail
            # Le user deployer (non-root) utilise sa copie du kubeconfig k3s.
            export KUBECONFIG="$HOME/.kube/config"
            CHART_DIR="$HOME/worldcup-deploy/helm/worldcup"
            helm upgrade --install worldcup "$CHART_DIR" \
              --namespace worldcup --create-namespace \
              --set app.image.repository="$IMAGE" \
              --set app.image.tag="$TAG" \
              --atomic --timeout 5m
            kubectl -n worldcup rollout status deployment/worldcup-worldcup --timeout=120s
