name: Deploy

# Déploiement continu : build -> push image GHCR -> helm upgrade sur le VPS (k3s).
# helm upgrade --install = CREATE (1er run) + UPDATE (runs suivants).
on:
  push:
    branches: [main]
  workflow_dispatch:        # permet aussi un déploiement manuel depuis l'onglet Actions

concurrency:
  group: deploy-production    # un seul déploiement à la fois
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  RELEASE_NAME: worldcup
  CHART_PATH: helm/worldcup

jobs:
  build-and-push:
    name: Build & push image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # autorise le push vers GHCR avec le GITHUB_TOKEN
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (lowercase)
        id: meta
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

  deploy:
    name: Helm upgrade on VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: helm upgrade --install via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          TAG: ${{ needs.build-and-push.outputs.tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,TAG,RELEASE_NAME,CHART_PATH
          script: |
            set -euo pipefail
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            APP_DIR="${VPS_REPO_PATH:-$HOME/capstone-dplc-student}"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
              --namespace worldcup --create-namespace \
              --set app.image.repository="$IMAGE" \
              --set app.image.tag="$TAG" \
              --atomic --timeout 5m
            kubectl -n worldcup rollout status deployment/${RELEASE_NAME}-worldcup --timeout=120s
