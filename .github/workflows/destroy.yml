name: Destroy

# Suppression de l'application déployée (le "destroy" du cycle create/update/destroy).
# Déclenchement MANUEL uniquement, avec confirmation, pour éviter tout accident.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Tapez "destroy" pour confirmer la suppression'
        required: true
        default: ""

jobs:
  destroy:
    name: kubectl delete on VPS
    runs-on: ubuntu-latest
    # Garde-fou : ne s'exécute que si l'utilisateur a tapé exactement "destroy".
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    steps:
      - name: kubectl delete via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            export KUBECONFIG="$HOME/.kube/config"
            # Supprime le namespace entier : deployments, services, hpa, ingress,
            # PVC (données PostgreSQL) et Secret partent avec lui.
            kubectl delete namespace worldcup --ignore-not-found --wait=true
