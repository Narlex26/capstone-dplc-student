# ============================================================
# Prometheus : scrape les métriques de l'app (/metrics) + règles d'alerte
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
# Droits de découverte des cibles (endpoints/pods du namespace worldcup)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerts.yml
    scrape_configs:
      # Prometheus lui-même
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      # Application express : découverte des endpoints du service svc-express
      - job_name: 'express'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['worldcup']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: svc-express
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
  alerts.yml: |
    groups:
      - name: express-alerts
        rules:
          - alert: ExpressPodDown
            expr: up{job="express"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Un pod express ne répond plus (scrape KO)"
          - alert: ExpressHighErrorRate
            expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) > 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Taux d'erreurs 5xx élevé sur express"
          - alert: ExpressHighLatency
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Latence p95 > 1s sur express"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
